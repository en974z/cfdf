<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Survivor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="ui-container" id="uiContainer">
        <h1 class="title">Neon Survivor</h1>
        <p class="score-text">Score final : <span id="finalScore">0</span></p>
        <button id="startGameBtn" class="glow-button">Commencer la partie</button>
    </div>
    
    <div class="hud" id="hud" style="display: none;">
        <div class="score-display">Score : <span id="scoreEl">0</span></div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="game.js"></script>
</body>
</html>
